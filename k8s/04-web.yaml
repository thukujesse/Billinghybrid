apiVersion: apps/v1
kind: Deployment
metadata:
  name: jtm-web
  namespace: jtm
  labels:
    app: jtm-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jtm-web
  template:
    metadata:
      labels:
        app: jtm-web
    spec:
      containers:
        - name: web
          image: jtm/web:latest
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: jtm-web
  namespace: jtm
spec:
  selector:
    app: jtm-web
  ports:
    - port: 3000
      targetPort: 3000
