apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jtm-db-pvc
  namespace: jtm
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: jtm-db
  namespace: jtm
spec:
  serviceName: jtm-db
  replicas: 1
  selector:
    matchLabels:
      app: jtm-db
  template:
    metadata:
      labels:
        app: jtm-db
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: jtm-db-secret
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U jtm"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: jtm-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: jtm-db
  namespace: jtm
spec:
  selector:
    app: jtm-db
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
