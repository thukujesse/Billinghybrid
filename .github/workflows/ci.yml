name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: jtm
          POSTGRES_PASSWORD: jtm
          POSTGRES_DB: jtm
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jtm"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://jtm:jtm@localhost:5432/jtm

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run migrations
        run: npm run migrate

      - name: Run tests
        run: npm test

      - name: Build API and web
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
