services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: jtm
      POSTGRES_PASSWORD: jtm
      POSTGRES_DB: jtm
    ports:
      - "5432:5432"
    volumes:
      - jtm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jtm"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  jtm_pgdata:
