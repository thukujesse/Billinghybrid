# JTM-specific FreeRADIUS SQL module config. Drop-in replacement for
# /etc/freeradius/3.0/mods-available/sql. Values for server/login/password
# are substituted at install time by bootstrap.sh from /opt/wg-manager/radius.env.

sql {
    dialect = "postgresql"
    driver = "rlm_sql_${dialect}"

    server   = "@PGHOST@"
    port     = "@PGPORT@"
    login    = "@PGUSER@"
    password = "@PGPASSWORD@"
    radius_db = "@PGDATABASE@"

    # Read NAS (RADIUS clients) from the `nas` table at startup. New MikroTiks
    # become trusted clients without restarting freeradius — see hup signal.
    read_clients = yes
    client_table = "nas"

    # Table name variables referenced by queries.conf. These must be set or
    # queries.conf fails to parse ("Reference ${authcheck_table} not found").
    authcheck_table  = "radcheck"
    authreply_table  = "radreply"
    groupcheck_table = "radgroupcheck"
    groupreply_table = "radgroupreply"
    usergroup_table  = "radusergroup"
    acct_table1      = "radacct"
    acct_table2      = "radacct"
    postauth_table   = "radpostauth"
    # Group membership attribute name (referenced in group-check / group-reply
    # queries to select rows where groupname matches the user's groups).
    group_attribute  = "SQL-Group"

    # PostgreSQL connection options. SSL is required by Render's external
    # connection string; sslmode is honored via the postgresql connector.
    postgresql {
        sslmode = "require"
    }

    pool {
        start    = ${thread[pool].start_servers}
        min      = ${thread[pool].min_spare_servers}
        max      = ${thread[pool].max_servers}
        spare    = ${thread[pool].max_spare_servers}
        uses     = 0
        retry_delay = 5
        lifetime = 0
        idle_timeout = 300
    }

    # Use the standard queries shipped with freeradius-postgresql.
    $INCLUDE ${modconfdir}/${.:name}/main/${dialect}/queries.conf

    # ---- JTM override: returning-customer auto-auth via active_devices ----
    # MikroTik hotspot profile has login-by=mac,http-pap with
    # mac-auth-mode=mac-as-username-and-password, so it sends Access-Request
    # with User-Name=<MAC> and password=<MAC>. We UNION active_devices into
    # the standard radcheck/radreply queries so a returning MAC with a live
    # grant is accepted with the right Session-Timeout + Mikrotik-Rate-Limit
    # — no portal redirect, customer is online instantly.
    #
    # The radcheck UNION arm preserves PPPoE + voucher auth (those rows live
    # in radcheck as before). Hotspot guests get an EXTRA accept path from
    # active_devices.
    authorize_check_query = "\
        SELECT id, username, attribute, value, op FROM ( \
          SELECT 0::bigint AS id, mac AS username, 'Cleartext-Password' AS attribute, mac AS value, ':=' AS op \
            FROM active_devices \
           WHERE mac = lower('%{SQL-User-Name}') AND expires_at > now() \
          UNION ALL \
          SELECT id::bigint, username, attribute, value, op FROM ${authcheck_table} \
           WHERE username = '%{SQL-User-Name}' \
        ) t ORDER BY id"

    authorize_reply_query = "\
        SELECT id, username, attribute, value, op FROM ( \
          SELECT 0::bigint AS id, mac AS username, 'Session-Timeout' AS attribute, \
                 GREATEST(60, EXTRACT(EPOCH FROM (expires_at - now()))::int)::text AS value, ':=' AS op \
            FROM active_devices \
           WHERE mac = lower('%{SQL-User-Name}') AND expires_at > now() \
          UNION ALL \
          SELECT 1::bigint AS id, mac AS username, 'Idle-Timeout' AS attribute, idle_timeout_seconds::text AS value, ':=' AS op \
            FROM active_devices \
           WHERE mac = lower('%{SQL-User-Name}') AND expires_at > now() \
          UNION ALL \
          SELECT 2::bigint AS id, mac AS username, 'Mikrotik-Rate-Limit' AS attribute, rate_limit AS value, '=' AS op \
            FROM active_devices \
           WHERE mac = lower('%{SQL-User-Name}') AND expires_at > now() AND rate_limit IS NOT NULL \
          UNION ALL \
          SELECT id::bigint + 10, username, attribute, value, op FROM ${authreply_table} \
           WHERE username = '%{SQL-User-Name}' \
        ) t ORDER BY id"
}
