sql {
    dialect = "postgresql"
    driver = "rlm_sql_${dialect}"

    server = "dpg-d8e1srcp3tds7383pq00-a.oregon-postgres.render.com"
    port = "5432"
    login = "jtm_db_h6o3_user"
    password = "PASTE_NEW_PASSWORD_HERE"
    radius_db = "jtm_db_h6o3"

    read_clients = yes
    client_table = "nas"

    authcheck_table = "radcheck"
    authreply_table = "radreply"
    groupcheck_table = "radgroupcheck"
    groupreply_table = "radgroupreply"
    usergroup_table = "radusergroup"
    acct_table1 = "radacct"
    acct_table2 = "radacct"
    postauth_table = "radpostauth"
    group_attribute = "SQL-Group"

    postgresql {
        sslmode = "require"
    }

    pool {
        start = 8
        min = 8
        max = 32
        spare = 4
        uses = 0
        retry_delay = 5
        lifetime = 0
        idle_timeout = 0
    }

    $INCLUDE ${modconfdir}/${.:name}/main/${dialect}/queries.conf

    authorize_check_query = "SELECT id, username, attribute, value, op FROM (SELECT 0::bigint AS id, mac AS username, 'Cleartext-Password' AS attribute, mac AS value, ':=' AS op FROM active_devices WHERE mac = lower('%{SQL-User-Name}') AND expires_at > now() UNION ALL SELECT id::bigint, username, attribute, value, op FROM ${authcheck_table} WHERE username = '%{SQL-User-Name}') t ORDER BY id"

    authorize_reply_query = "SELECT id, username, attribute, value, op FROM (SELECT 0::bigint AS id, mac AS username, 'Session-Timeout' AS attribute, GREATEST(60, EXTRACT(EPOCH FROM (expires_at - now()))::int)::text AS value, ':=' AS op FROM active_devices WHERE mac = lower('%{SQL-User-Name}') AND expires_at > now() UNION ALL SELECT 1::bigint AS id, mac AS username, 'Idle-Timeout' AS attribute, idle_timeout_seconds::text AS value, ':=' AS op FROM active_devices WHERE mac = lower('%{SQL-User-Name}') AND expires_at > now() UNION ALL SELECT 2::bigint AS id, mac AS username, 'Mikrotik-Rate-Limit' AS attribute, rate_limit AS value, '=' AS op FROM active_devices WHERE mac = lower('%{SQL-User-Name}') AND expires_at > now() AND rate_limit IS NOT NULL UNION ALL SELECT id::bigint + 10, username, attribute, value, op FROM ${authreply_table} WHERE username = '%{SQL-User-Name}') t ORDER BY id"
}
